services:
  mysql:
    image: mysql:8.0
    container_name: pokemon_mysql
    environment:
      MYSQL_ROOT_PASSWORD: pokemon123
      MYSQL_DATABASE: pokemon_db
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppokemon123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  metabase:
    image: metabase/metabase:latest
    container_name: pokemon_metabase
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
  metabase_data:
